<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scooter BBQ - Authentic BBQ Dining</title>

<meta name="description" content="Experience bold BBQ flavors at Scooter BBQ. Premium grilled dishes, smoky flavors, and an unforgettable dining experience.">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
*{scroll-behavior:smooth}
body{margin:0;font-family:'Montserrat',sans-serif}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState,useEffect,useRef}=React

/* ---------------- MAIN APP ---------------- */

const RestaurantWebsite=()=>{
const[currentPage,setCurrentPage]=useState("home")

const navigateTo=(page)=>{
setCurrentPage(page)
window.scrollTo({top:0,behavior:"smooth"})
}

return(
<div className="bg-black text-white min-h-screen">

<Navigation currentPage={currentPage} navigateTo={navigateTo}/>

{currentPage==="home" && <HomePage navigateTo={navigateTo}/>}
{currentPage==="menu" && <MenuPage/>}
{currentPage==="about" && <AboutPage/>}
{currentPage==="contact" && <ContactPage/>}

<Footer navigateTo={navigateTo}/>

</div>
)
}

/* ---------------- NAVBAR ---------------- */

const Navigation=({navigateTo,currentPage})=>{

const navItems=["Home","Menu","About","Contact"]

return(

<nav className="fixed top-0 w-full bg-black/95 backdrop-blur py-5 border-b border-white/10 z-50">

<div className="max-w-7xl mx-auto px-6 flex justify-between items-center">

<div onClick={()=>navigateTo("home")}
className="text-2xl font-bold cursor-pointer"
style={{fontFamily:"Cormorant Garamond"}}>

<span className="text-yellow-400">Scooter BBQ</span>

</div>

<div className="flex gap-8">

{navItems.map(item=>(
<button
key={item}
onClick={()=>navigateTo(item.toLowerCase())}
className={`uppercase tracking-widest text-sm ${currentPage===item.toLowerCase()?"text-yellow-400":"text-white/70"} hover:text-yellow-400`}
>
{item}
</button>
))}

</div>

</div>
</nav>

)
}

/* ---------------- HOME ---------------- */

const HomePage=({navigateTo})=>{

return(

<div className="pt-32">

<section className="text-center py-32 px-6">

<h1 className="text-6xl font-bold mb-6"
style={{fontFamily:"Cormorant Garamond"}}>

Welcome to <span className="text-yellow-400">Scooter BBQ</span>

</h1>

<p className="text-xl text-white/70 max-w-2xl mx-auto mb-10">
Authentic smoky BBQ flavors, premium grilled meats, and unforgettable dining moments.
</p>

<button
onClick={()=>navigateTo("menu")}
className="bg-yellow-400 text-black px-8 py-4 font-bold uppercase tracking-widest hover:bg-yellow-300">

Explore Menu

</button>

</section>

</div>

)
}

/* ---------------- MENU ---------------- */

const MenuPage=()=>{

const items=[

{name:"BBQ Chicken Wings",price:"₹450"},
{name:"Smoked BBQ Ribs",price:"₹750"},
{name:"Grilled Paneer Skewers",price:"₹380"},
{name:"Classic BBQ Burger",price:"₹420"}

]

return(

<div className="pt-32 pb-24 px-6">

<h1 className="text-5xl font-bold text-center mb-16"
style={{fontFamily:"Cormorant Garamond"}}>

Scooter BBQ Menu

</h1>

<div className="max-w-4xl mx-auto grid md:grid-cols-2 gap-8">

{items.map((item,i)=>(
<div key={i} className="border border-white/10 p-6 rounded">

<h3 className="text-xl font-bold mb-2">{item.name}</h3>
<div className="text-yellow-400">{item.price}</div>

</div>
))}

</div>

</div>

)
}

/* ---------------- ABOUT ---------------- */

const AboutPage=()=>{

return(

<div className="pt-32 pb-24 px-6">

<div className="max-w-4xl mx-auto text-center">

<h1 className="text-5xl font-bold mb-10"
style={{fontFamily:"Cormorant Garamond"}}>

About <span className="text-yellow-400">Scooter BBQ</span>

</h1>

<p className="text-white/70 text-lg leading-relaxed">

Scooter BBQ celebrates the art of smoky barbecue cooking.  
Our chefs combine traditional grilling techniques with modern flavors to create dishes that are bold, rich, and unforgettable.

From slow-smoked ribs to perfectly grilled meats, every dish is crafted to deliver an authentic BBQ experience.

</p>

</div>

</div>

)
}

/* ---------------- CONTACT ---------------- */

const ContactPage=()=>{

return(

<div className="pt-32 pb-24 px-6">

<div className="max-w-xl mx-auto">

<h1 className="text-5xl font-bold mb-10 text-center"
style={{fontFamily:"Cormorant Garamond"}}>

Contact Scooter BBQ

</h1>

<div className="space-y-4 text-center text-white/70">

<div>MG Road, Connaught Place</div>
<div>New Delhi, India</div>
<div className="text-yellow-400">+91 11 4567 8900</div>
<div>reservations@scooterbbq.com</div>

</div>

</div>

</div>

)
}

/* ---------------- FOOTER ---------------- */

const Footer=({navigateTo})=>{

return(

<footer className="border-t border-white/10 py-10 text-center text-white/40">

<div className="mb-4">

<span className="text-yellow-400 font-bold">Scooter BBQ</span>

</div>

<div>

© 2026 Scooter BBQ. All rights reserved.

</div>

</footer>

)
}

/* ---------------- RENDER ---------------- */

const root=ReactDOM.createRoot(document.getElementById("root"))
root.render(<RestaurantWebsite/>)

</script>

</body>
</html>
